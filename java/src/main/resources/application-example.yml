server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://localhost:3306/yumian?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
  data:
    redis:
      host: localhost
      port: 6379
      database: 6

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.yumian.entity
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: your-jwt-secret-key
  expire: 86400000

ai:
  provider: deepseek   # 可选: deepseek / ollama

ollama:
  url: http://localhost:11434/api/chat
  model: qwen2.5:7b

deepseek:
  api-key: your-deepseek-api-key
  url: https://api.deepseek.com/v1/chat/completions
